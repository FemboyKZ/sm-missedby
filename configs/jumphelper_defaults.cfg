// Deploy to: addons/sourcemod/configs/jumphelper_defaults.cfg
//
// Structure:
//   "JumpHelperDefaults"
//   {
//       "<exact_map_name>"
//       {
//           "<zone name>"
//           {
//               "point0_x"    "<float>"   // Point 0, start of segment A (XY only)
//               "point0_y"    "<float>"
//               "point1_x"    "<float>"   // Point 1, shared apex of both segments
//               "point1_y"    "<float>"
//               "point2_x"    "<float>"   // Point 2, start of segment B (optional)
//               "point2_y"    "<float>"
//               "threshold_z" "<float>"   // Z coordinate player must cross to trigger
//               "has_p2"      "0 or 1"    // 1 = two-segment zone, 0 = single segment (default 1)
